<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Intake Form</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --navy: #1E2D4A;
    --bg: #F4F6F9;
    --surface: #FFFFFF;
    --border: rgba(30,45,74,0.12);
    --border-strong: rgba(30,45,74,0.22);
    --text-primary: #1E2D4A;
    --text-secondary: #5A6A82;
    --text-muted: #8A9AB2;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --radius: 8px;
    --radius-lg: 12px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111822;
      --surface: #1A2333;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.16);
      --text-primary: #E8EDF5;
      --text-secondary: #8AA0BE;
      --text-muted: #5A6E8A;
      --teal-light: #0A3325;
    }
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    font-size: 13px;
    padding: 12px;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    margin-bottom: 8px;
  }

  .section-header {
    padding: 7px 14px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .section-body { padding: 12px 14px; }

  .field { margin-bottom: 10px; }
  .field:last-child { margin-bottom: 0; }

  .field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .field select {
    width: 100%;
    font-family: var(--font);
    font-size: 13px;
    color: var(--text-primary);
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.15s;
  }

  .field select:focus {
    border-color: var(--teal);
    box-shadow: 0 0 0 3px rgba(29,158,117,0.12);
  }

  .disposition-group {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .disposition-btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    padding: 5px 13px;
    border-radius: 20px;
    border: 1.5px solid var(--border-strong);
    background: var(--surface);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.12s;
  }

  .disposition-btn:hover { border-color: var(--navy); color: var(--text-primary); }
  .disposition-btn.selected { background: var(--navy); border-color: var(--navy); color: #fff; }

  .action-row { display: flex; gap: 8px; margin-top: 8px; }

  .btn {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    padding: 9px 16px;
    border-radius: var(--radius);
    border: 1.5px solid transparent;
    cursor: pointer;
    flex: 1;
    transition: all 0.12s;
  }

  .btn-primary { background: var(--teal); color: #fff; border-color: var(--teal); }
  .btn-primary:hover { filter: brightness(1.08); }
  .btn-secondary { background: transparent; color: var(--text-secondary); border-color: var(--border-strong); }
  .btn-secondary:hover { background: var(--bg); color: var(--text-primary); }

  .saved-banner {
    display: none;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    background: var(--teal-light);
    border: 1px solid rgba(29,158,117,0.3);
    border-radius: var(--radius);
    font-size: 12px;
    color: var(--teal);
    font-weight: 600;
    margin-bottom: 8px;
  }
</style>
</head>
<body>

<div class="saved-banner" id="savedBanner">✓ &nbsp;Saved successfully</div>

<div class="section">
  <div class="section-header">Caller details</div>
  <div class="section-body">
    <div class="field">
      <label>Gender</label>
      <select id="fGender">
        <option value="">Select…</option>
        <option>Male</option>
        <option>Female</option>
        <option>Trans</option>
        <option>Non-binary</option>
        <option>Other</option>
      </select>
    </div>
    <div class="field">
      <label>Age bracket</label>
      <select id="fAge">
        <option value="">Select…</option>
        <option>10–12</option>
        <option>13–15</option>
        <option>16–18</option>
        <option>18+</option>
      </select>
    </div>
    <div class="field">
      <label>Child's mood</label>
      <select id="fMood">
        <option value="">Select…</option>
        <option>Happy</option>
        <option>Stressed</option>
        <option>Anxious</option>
        <option>Tired</option>
      </select>
    </div>
    <div class="field">
      <label>Reason for calling</label>
      <select id="fReason">
        <option value="">Select…</option>
        <option>Advice</option>
        <option>Just a chat</option>
        <option>Report an issue</option>
      </select>
    </div>
  </div>
</div>

<div class="section">
  <div class="section-header">Call outcome</div>
  <div class="section-body">
    <div class="disposition-group">
      <button class="disposition-btn" onclick="selDP(this)">Resolved</button>
      <button class="disposition-btn" onclick="selDP(this)">Escalated</button>
      <button class="disposition-btn" onclick="selDP(this)">Callback booked</button>
      <button class="disposition-btn" onclick="selDP(this)">No action</button>
      <button class="disposition-btn" onclick="selDP(this)">Transferred</button>
      <button class="disposition-btn" onclick="selDP(this)">Voicemail</button>
    </div>
  </div>
</div>

<div class="action-row">
  <button class="btn btn-secondary" onclick="clearForm()">Clear</button>
  <button class="btn btn-primary" onclick="saveForm()">Save &amp; wrap up</button>
</div>

<script>
  const AGENT_APP_ORIGIN = 'https://agent.puzzel.com';
  let port = null;

  window.addEventListener('message', (message) => {
    if (message.origin !== AGENT_APP_ORIGIN) return;
    if (!port && message.ports && message.ports[0]) {
      port = message.ports[0];
      port.onmessage = handleWidgetMessage;
      port.postMessage({ subscribe: 'requestAccepted' });
      port.postMessage({ subscribe: 'requestEnded' });
    }
  });

  function handleWidgetMessage(message) {
    const data = message.data;
    if (!data || data.type !== 'event') return;
    if (data.name === 'requestEnded') clearForm();
  }

  function selDP(btn) {
    document.querySelectorAll('.disposition-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }

  function saveForm() {
    const banner = document.getElementById('savedBanner');
    banner.style.display = 'flex';
    setTimeout(() => { banner.style.display = 'none'; }, 2500);
  }

  function clearForm() {
    ['fGender','fAge','fMood','fReason'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.querySelectorAll('.disposition-btn').forEach(b => b.classList.remove('selected'));
  }
</script>
</body>
</html>
